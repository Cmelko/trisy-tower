name: Deploy Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - scores.txt

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build config.js
        env:
          SAVE_URL: ${{ vars.TRISY_SAVE_URL }}
          TOKEN: ${{ secrets.LEADERBOARD_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const saveUrl = process.env.SAVE_URL || '';
          const token = process.env.TOKEN || '';
          fs.writeFileSync('config.js', [
            \"window.TRISY_REPO='Cmelko/trisy-tower';\",
            \"window.TRISY_SAVE_URL='\" + saveUrl.replace(/'/g, '') + \"';\",
            \"window.TRISY_DISPATCH_TOKEN='\" + token.replace(/'/g, '') + \"';\",
            ''
          ].join('\n'));
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
