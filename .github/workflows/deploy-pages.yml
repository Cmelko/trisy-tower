name: Deploy Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - scores.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build config.js and cache-bust assets
        env:
          SAVE_URL: ${{ vars.TRISY_SAVE_URL }}
          TOKEN: ${{ secrets.LEADERBOARD_TOKEN }}
          BUILD: ${{ github.sha }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const build = (process.env.BUILD || '').slice(0, 7);
          const saveUrl = process.env.SAVE_URL || '';
          const token = process.env.TOKEN || '';
          if (!token && !saveUrl) {
            console.log('::warning::LEADERBOARD_TOKEN aj TRISY_SAVE_URL chýbajú — ukladanie nebude fungovať');
          }
          fs.writeFileSync('config.js', [
            "window.TRISY_REPO='Cmelko/trisy-tower';",
            `window.TRISY_SAVE_URL='${saveUrl.replace(/'/g, '')}';`,
            `window.TRISY_DISPATCH_TOKEN='${token.replace(/'/g, '')}';`,
            `window.TRISY_BUILD='${build}';`,
            '',
          ].join('\n'));
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace(/href="([^"?]+\.css)(?:\?v=[^"]*)?"/g, `href="$1?v=${build}"`);
          html = html.replace(/src="([^"?]+\.js)(?:\?v=[^"]*)?"/g, `src="$1?v=${build}"`);
          fs.writeFileSync('index.html', html);
          fs.writeFileSync('.nojekyll', '');
          NODE

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          exclude_assets: '.github,worker,SETUP-LEADERBOARD.md,scores.txt'
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy Trisy Tower'
