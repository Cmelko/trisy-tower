name: Deploy Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - scores.txt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build config.js and cache-bust assets
        env:
          SAVE_URL: ${{ vars.TRISY_SAVE_URL }}
          TOKEN: ${{ secrets.LEADERBOARD_TOKEN }}
          BUILD: ${{ github.sha }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const build = (process.env.BUILD || '').slice(0, 7);
          const saveUrl = process.env.SAVE_URL || '';
          const token = process.env.TOKEN || '';
          fs.writeFileSync('config.js', [
            "window.TRISY_REPO='Cmelko/trisy-tower';",
            `window.TRISY_SAVE_URL='${saveUrl.replace(/'/g, '')}';`,
            `window.TRISY_DISPATCH_TOKEN='${token.replace(/'/g, '')}';`,
            `window.TRISY_BUILD='${build}';`,
            '',
          ].join('\n'));
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace(/href="([^"?]+\.css)"/g, `href="$1?v=${build}"`);
          html = html.replace(/src="([^"?]+\.js)"/g, `src="$1?v=${build}"`);
          fs.writeFileSync('index.html', html);
          NODE

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
