name: Save score

on:
  repository_dispatch:
    types: [save-score]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update scores.txt
        env:
          NAME: ${{ github.event.client_payload.name }}
          SCORE: ${{ github.event.client_payload.score }}
          HEIGHT: ${{ github.event.client_payload.height }}
          COMBO: ${{ github.event.client_payload.combo }}
          DATE: ${{ github.event.client_payload.date }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          name = os.environ.get("NAME", "Hráč").replace("\t", " ").strip()[:20] or "Hráč"
          score = int(float(os.environ.get("SCORE", "0")))
          height = int(float(os.environ.get("HEIGHT", "0")))
          combo = int(float(os.environ.get("COMBO", "0")))
          date = os.environ.get("DATE", "")[:10] or "1970-01-01"

          path = Path("scores.txt")
          lines = path.read_text(encoding="utf-8").splitlines() if path.exists() else ["# score\tname\theight\tcombo\tdate"]
          header = lines[0] if lines and lines[0].startswith("#") else "# score\tname\theight\tcombo\tdate"

          entries = []
          for line in lines:
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              parts = line.split("\t")
              if len(parts) < 5:
                  continue
              try:
                  entries.append((int(parts[0]), parts[1], int(parts[2]), int(parts[3]), parts[4]))
              except ValueError:
                  continue

          entries.append((score, name, height, combo, date))
          entries.sort(key=lambda x: (-x[0], x[1].lower()))
          entries = entries[:25]

          out = header + "\n"
          for e in entries:
              out += f"{e[0]}\t{e[1]}\t{e[2]}\t{e[3]}\t{e[4]}\n"
          path.write_text(out, encoding="utf-8")
          PY

      - name: Commit scores
        env:
          NAME: ${{ github.event.client_payload.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scores.txt
          git diff --staged --quiet || git commit -m "Update leaderboard: $NAME"
          git push
